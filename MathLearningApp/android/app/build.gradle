apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * React Native bundle configuration
 * Enable bundling for debug builds to create standalone APK
 */
project.ext.react = [
    enableHermes: true,  // Use Hermes engine
    bundleInDebug: false, // Use Metro server for debug builds
    bundleInRelease: true, // Bundle JS in release builds
]

// 从.env文件读取配置
def envVar(String key, String defaultValue) {
    def value = System.getenv(key)
    if (value == null) {
        // 尝试从项目根目录的.env文件读取
        def envFile = file("../../.env")
        if (envFile.exists()) {
            def props = new Properties()
            envFile.withInputStream { stream ->
                props.load(new InputStreamReader(stream))
            }
            value = props.getProperty(key, defaultValue)
        } else {
            value = defaultValue
        }
    }
    return value
}

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Folders */
    root = file("../../")
    reactNativeDir = file("../../node_modules/react-native")
    codegenDir = file("../../node_modules/@react-native/codegen")
    cliFile = file("../../node_modules/react-native/cli.js")

    /* Variants */
    // Removed debuggableVariants to ensure debug builds use bundled JS instead of dev server

    /* Bundling */
    bundleAssetName = "index.android.bundle"
    entryFile = file("../../index.js")

    /* Hermes Commands */
    hermesCommand = "../../node_modules/react-native/sdks/hermesc/%OS-BIN%/hermesc"
    hermesFlags = ["-O", "-output-source-map"]
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = 'org.webkit:android-jsc-intl:+'`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.mathlearningapptemp"
    defaultConfig {
        applicationId "com.mathlearningapptemp"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"

        // Resolve react-native-camera flavor ambiguity
        missingDimensionStrategy 'react-native-camera', 'general'

        // 从.env文件读取API密钥并添加到BuildConfig
        def configVars = [
            'BAIDU_OCR_API_KEY',
            'BAIDU_OCR_SECRET_KEY',
            'DEEPSEEK_API_KEY',
            'OCR_PROVIDER',
            'GENERATION_PROVIDER',
            'ENABLE_AI_GENERATION',
            'USE_LOCAL_FALLBACK'
        ]
        configVars.each { varName ->
            def varValue = envVar(varName, '')
            buildConfigField 'String', "ENV_$varName", "\"$varValue\""
        }
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Caution! In production, you need to generate your own keystore file.
            // see https://reactnative.dev/docs/signed-apk-android.
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(project)
