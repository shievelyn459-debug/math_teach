name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to run tests on'
        required: true
        default: 'ios'
        type: choice
        options:
          - ios
          - android
          - both

env:
  NODE_VERSION: '18'

jobs:
  e2e-ios:
    name: iOS E2E Tests
    runs-on: macos-latest
    if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both' || github.event_name != 'workflow_dispatch' }}
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: MathLearningApp/package-lock.json

      - name: Install Dependencies
        working-directory: MathLearningApp
        run: npm ci

      - name: Install Detox CLI
        run: npm install -g detox-cli

      - name: Cache Pods
        uses: actions/cache@v3
        with:
          path: MathLearningApp/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('MathLearningApp/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install Pods
        working-directory: MathLearningApp/ios
        run: pod install

      - name: Build iOS App
        working-directory: MathLearningApp
        run: detox build -c ios.sim.debug

      - name: Run iOS E2E Tests
        working-directory: MathLearningApp
        run: detox test -c ios.sim.debug --record-videos failing --take-screenshots failing

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-e2e-test-results
          path: |
            MathLearningApp/artifacts/
            MathLearningApp/coverage/
          retention-days: 7

  e2e-android:
    name: Android E2E Tests
    runs-on: macos-latest
    if: ${{ github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both' || github.event_name != 'workflow_dispatch' }}
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: MathLearningApp/package-lock.json

      - name: Install Dependencies
        working-directory: MathLearningApp
        run: npm ci

      - name: Install Detox CLI
        run: npm install -g detox-cli

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: AVD Cache
        uses: actions/cache@v3
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-33

      - name: Create AVD and Generate Snapshot for Caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      - name: Build Android App
        working-directory: MathLearningApp
        run: detox build -c android.emu.debug

      - name: Run Android E2E Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-load -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          working-directory: MathLearningApp
          script: detox test -c android.emu.debug --record-videos failing --take-screenshots failing

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-test-results
          path: |
            MathLearningApp/artifacts/
            MathLearningApp/coverage/
          retention-days: 7

  # Notification job
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [e2e-ios, e2e-android]
    if: failure()

    steps:
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          fields: repo,message,commit,author,action,eventName,ref,workflow
          text: |
            E2E Tests Failed!
            Platform: ${{ github.event.inputs.platform || 'both' }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
